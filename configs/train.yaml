seed: 42
n_jobs: 6

paths:
  raw_trips: data/raw/trips.csv
  raw_orders: data/raw/orders.csv
  processed_dir: data/processed
  model_dir: models
  model_path: models/eta_lgbm.pkl
  feature_config_path: models/feature_config.json
  mlflow_tracking_uri: sqlite:///mlflow.db
  mlflow_experiment: routeOptimizer-eta

lightgbm:
  objective: regression
  metric: mae
  boosting_type: gbdt
  n_estimators: 500
  learning_rate: 0.05
  num_leaves: 31
  max_depth: -1
  min_child_samples: 20
  subsample: 0.9
  colsample_bytree: 0.9
  reg_alpha: 0.0
  reg_lambda: 0.0
  random_state: 42
  n_jobs: 6
  device: cpu
